# Agent / automation 通过 PR 或 commit 追加新来源（勿改 config.yaml 主配置）
# 支持类型：rss_feeds.feeds | yiimp_pools.pools | telegram_public.channels
#          exchanges.exchanges | github.queries | github_releases.repos | generic_json.endpoints

version: 1
updated_at: "2026-07-23T01:05:00Z"
updated_by: cursor-agent
notes: "新增 Ergo Forum RSS、brisvia Telegram、QUB/Sharecoin/Dilithion GitHub Releases 与搜索 query"

sources:
  rss_feeds:
    feeds:
      - name: altcoinstalks
        url: https://www.altcoinstalks.com/index.php?action=.xml;type=rss
        enabled: true
        keywords: ["mining", "pow", "gpu", "mainnet", "kawpow", "randomx", "announcement", "launch"]
      - name: ergoforum
        url: https://www.ergoforum.org/latest.rss
        enabled: true
        keywords: ["mining", "pow", "pool", "mainnet", "autolykos", "gpu", "launch", "coin"]
  yiimp_pools:
    pools:
      - name: gaelium
        url: https://pool.gaelium.io/api/currencies
        referer: https://pool.gaelium.io/
        enabled: true
      - name: miningmadness
        url: https://miningmadness.com/api/currencies
        referer: https://miningmadness.com/
        enabled: true
  telegram_public:
    channels:
      - name: gaelium
        slug: gaelium
        enabled: true
      - name: filotrade
        slug: filotrade
        enabled: true
      - name: cryptomining_news
        slug: cryptomining_news
        enabled: true
      - name: fusionlayer
        slug: fusionlayer
        enabled: true
      - name: brisvia
        slug: brisvia
        enabled: true
  exchanges:
    exchanges:
      - name: freiexchange
        type: generic
        url: https://api.freiexchange.com/public/ticker
        web_url: https://freiexchange.com/market
        enabled: true
  github:
    queries:
      - "mainnet gpu mining created:>{since}"
      - "TensorHash mainnet created:>{since}"
      - "Gaelium mainnet created:>{since}"
      - "OggPoW mainnet created:>{since}"
      - "Oggchain mainnet created:>{since}"
      - "Malairte mainnet created:>{since}"
      - "FusionHash mainnet created:>{since}"
      - "QSDM proof-of-work created:>{since}"
      - "KeryxHash mainnet created:>{since}"
      - "KryoMine gpu mining created:>{since}"
      - "Horizon HRZN KawPoW created:>{since}"
      - "FlowCoin RandomX mainnet created:>{since}"
      - "pearlhash PoUW created:>{since}"
      - "BlockZero BLOZ RandomX created:>{since}"
      - "Filopow mainnet created:>{since}"
      - "FiloPoW kawpow created:>{since}"
      - "modelOS MDL mainnet created:>{since}"
      - "Hydrax pearlhash miner created:>{since}"
      - "Sharecoin mainnet created:>{since}"
      - "QUB proof-of-work created:>{since}"
      - "Dilithion mainnet created:>{since}"
  github_releases:
    repos:
      - repo: tensorium-labs/tensorium-core
        label: Tensorium
        enabled: true
      - repo: iriumlabs/irium
        label: Irium
        enabled: true
      - repo: GaeliumCore/Gaelium
        label: Gaelium
        enabled: true
      - repo: Oggcoin/OggPoW-Miner
        label: OggPoW Miner
        enabled: true
      - repo: Oggcoin/Ogg-Node
        label: Ogg Node
        enabled: true
      - repo: Oggchain/Oggchain
        label: Oggchain
        enabled: true
      - repo: computervirtualservices/malairte
        label: Malairte
        enabled: true
      - repo: 0xFusionLayer/fxl-node
        label: FusionLayer Node
        enabled: true
      - repo: 0xFusionLayer/warpminer
        label: WarpMiner
        enabled: true
      - repo: Keryx-Labs/keryx-miner
        label: Keryx Miner
        enabled: true
      - repo: personachain001/aethercoin
        label: KryoMine
        enabled: true
      - repo: HashLatch/PoWH
        label: HashLatch
        enabled: true
      - repo: brisvia/brisvia
        label: Brisvia
        enabled: true
      - repo: blackbeardONE/QSDM
        label: QSDM
        enabled: true
      - repo: zunmax/hash-mining
        label: HASH Miner
        enabled: true
      - repo: pearl-research-labs/pearl
        label: Pearl
        enabled: true
      - repo: Rexemre/blockzero-ops
        label: BlockZero Ops
        enabled: true
      - repo: filoproject/filopow
        label: FiloPoW
        enabled: true
      - repo: modeloslab/modelos
        label: modelOS
        enabled: true
      - repo: bighurt23/hydrax-miner
        label: HydraX Miner
        enabled: true
      - repo: AlxProe/qub-core
        label: QUB Core
        enabled: true
      - repo: TVHeroes/sharecoin
        label: Sharecoin
        enabled: true
      - repo: dilithion/dilithion
        label: Dilithion
        enabled: true
  generic_json:
    enabled: true
    endpoints:
      - name: cryptunit
        url: https://www.cryptunit.com/api/coins
        enabled: true
        mode: list
        id_field: ticker
        title_template: "{id} new on cryptunit"
        link_template: "https://www.cryptunit.com/coin/{id}"
      - name: grandpool
        url: https://api.grandpool.io/pools
        enabled: true
        mode: list_path
        list_path: pools
        id_field: info.blockchain
        title_template: "{id} new on grandpool"
        link_template: "https://grandpool.io/"
      - name: miningpoolhub
        url: https://miningpoolhub.com/index.php?page=api&action=getminingandprofitsstatistics&api_key=
        enabled: true
        mode: list_path
        list_path: return
        id_field: symbol
        title_template: "{id} new on miningpoolhub"
        link_template: "https://miningpoolhub.com/index.php?page=getdashboard&user=&id={id}"
      - name: miningboard
        url: https://pool.miningboard.com/api/v1/pools
        enabled: true
        mode: list
        id_field: coin
        title_template: "{id} new on miningboard"
        link_template: "https://pool.miningboard.com/pools/{id}"
      - name: rainbowminer_coins
        url: https://raw.githubusercontent.com/RainbowMiner/RainbowMiner/master/Data/coins.json
        enabled: true
        mode: dict_keys
        id_field: id
        title_template: "{id} new in RainbowMiner coins.json"
        link_template: "https://github.com/RainbowMiner/RainbowMiner"
      - name: nonkyc
        url: https://nonkyc.io/api/v2/market/getlist
        enabled: true
        mode: list
        id_field: symbol
        title_template: "{id} new on nonkyc"
        link_template: "https://nonkyc.io/"
      - name: nestex
        url: https://trade.nestex.one/api/cg/tickers
        enabled: true
        mode: list
        id_field: ticker_id
        title_template: "{id} new on nestex"
        link_template: "https://trade.nestex.one/"
      - name: coinex
        url: https://api.coinex.com/v1/market/ticker/all
        enabled: true
        mode: list_path
        list_path: data.ticker
        id_field: id
        title_template: "{id} new on coinex"
        link_template: "https://www.coinex.com/en/exchange"
      - name: coinstore
        url: https://api.coinstore.com/api/v1/market/tickers
        enabled: true
        mode: list_path
        list_path: data
        id_field: symbol
        title_template: "{id} new on coinstore"
        link_template: "https://www.coinstore.com/#/spot/{id}"
